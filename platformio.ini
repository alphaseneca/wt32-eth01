; ============================================================
; PlatformIO Configuration for WT32-ETH01
; ============================================================
; Board: Wireless-Tag WT32-ETH01
; MCU:   ESP32 (Dual-core Xtensa LX6, 240 MHz)
; PHY:   LAN8720A (10/100 Mbps Ethernet via internal RMII)
; ============================================================

[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200

; Upload via USB-TTL adapter (default UART)
upload_speed = 921600

; Library dependencies
lib_deps =
    ; WebServer library purpose-built for WT32-ETH01
    khoih-prog/WebServer_WT32_ETH01@^1.5.1
    ; MQTT client
    knolleary/PubSubClient@^2.8
